document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

cyan (data viz / map accents; uploads palette) */\n  --pl-cyan-100:  #D8F3F7;\n  --pl-cyan-300:  #8CDEE6;\n  --pl-cyan-500:  #3ACCD6;\n  --pl-cyan-700:  #1C8891;\n\n  /* Success — mint green (confirmed from site: \"WITH PORTLESS\" pill,\n     rating stars, success deltas, bar chart fills) */\n  --pl-mint-50:  #E8FAF1;\n  --pl-mint-100: #CEF1DE;\n  --pl-mint-300: #6BD9A3;\n  --pl-mint-500: #22C770;\n  --pl-mint-600: #14A75A;\n\n  /* Neutrals */\n  --pl-ink:      #2F2F2F;   /* uploads palette near-black */\n  --pl-white:    #FFFFFF;\n  --pl-gray-25:  #FAFBFD;\n  --pl-gray-50:  #F4F6FB;\n  --pl-gray-100: #EAEEF6;\n  --pl-gray-200: #D8DDE9;\n  --pl-gray-300: #B9C0D2;\n  --pl-gray-400: #8D95AD;\n  --pl-gray-500: #646B85;\n  --pl-gray-600: #424867;\n  --pl-gray-700: #2A2F4A;\n\n  /* ------------------------------------------------------------------\n     SEMANTIC TOKENS\n     ------------------------------------------------------------------ */\n\n  /* Backgrounds */\n  --bg-page:        var(--pl-white);\n  --bg-subtle:      var(--pl-gray-50);\n  --bg-muted:       var(--pl-gray-100);\n  --bg-inverse:     var(--pl-navy-600);\n  --bg-inverse-alt: var(--pl-navy-800);\n  --bg-brand:       var(--pl-blue-600);\n  --bg-brand-soft:  var(--pl-blue-50);\n\n  /* Foregrounds */\n  --fg-1: var(--pl-navy-600);   /* primary text: headings, body */\n  --fg-2: var(--pl-gray-600);   /* secondary: supporting copy */\n  --fg-3: var(--pl-gray-500);   /* tertiary: captions, labels */\n  --fg-4: var(--pl-gray-400);   /* placeholder, disabled */\n  --fg-on-brand: var(--pl-white);\n  --fg-brand:    var(--pl-blue-600);\n  --fg-accent:   var(--pl-orange-500);\n\n  /* Borders / dividers */\n  --border-subtle: var(--pl-gray-100);\n  --border-base:   var(--pl-gray-200);\n  --border-strong: var(--pl-gray-300);\n  --border-brand:  var(--pl-blue-500);\n\n  /* Status */\n  --success: var(--pl-mint-500);\n  --success-bg: var(--pl-mint-50);\n  --warning: var(--pl-yellow-500);\n  --warning-bg: var(--pl-yellow-100);\n  --danger:  var(--pl-orange-600);\n  --danger-bg: var(--pl-orange-50);\n  --info:    var(--pl-cyan-500);\n  --info-bg: var(--pl-cyan-100);\n\n  /* ------------------------------------------------------------------\n     TYPOGRAPHY\n     ------------------------------------------------------------------ */\n\n  --font-sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;\n\n  /* Font sizes — 1.250 major third scale, tuned for a marketing + app hybrid */\n  --fs-display-1: clamp(3.25rem, 5vw + 1rem, 5.25rem); /* @kind other */\n  --fs-display-2: clamp(2.5rem, 4vw + 1rem, 4rem); /* @kind other */\n  --fs-h1: 3rem;        /* 48 */\n  --fs-h2: 2.25rem;     /* 36 */\n  --fs-h3: 1.75rem;     /* 28 */\n  --fs-h4: 1.375rem;    /* 22 */\n  --fs-h5: 1.125rem;    /* 18 */\n  --fs-lead: 1.25rem;   /* 20 — hero subheads */\n  --fs-body: 1rem;      /* 16 */\n  --fs-sm: 0.875rem;    /* 14 */\n  --fs-xs: 0.75rem;     /* 12 — eyebrows, chips, labels */\n\n  --lh-tight: 1.05; /* @kind font */\n  --lh-snug:  1.2;  /* @kind font */\n  --lh-base:  1.5;  /* @kind font */\n  --lh-loose: 1.7;  /* @kind font */\n\n  --ls-tight:   -0.03em;  /* @kind font */\n  --ls-snug:    -0.015em; /* @kind font */\n  --ls-normal:   0;       /* @kind font */\n  --ls-eyebrow:  0.14em;  /* @kind font */\n\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-black:   800; /* @kind font */\n\n  /* ------------------------------------------------------------------\n     SPACING — 4px base\n     ------------------------------------------------------------------ */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n  --space-32: 128px;\n\n  /* ------------------------------------------------------------------\n     RADII\n     ------------------------------------------------------------------ */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-2xl: 32px;\n  --radius-pill: 999px;\n\n  /* ------------------------------------------------------------------\n     SHADOWS — soft, airy. Used on testimonial cards, stat chips, popovers.\n     ------------------------------------------------------------------ */\n  --shadow-xs: 0 1px 2px rgba(13, 31, 95, 0.06);\n  --shadow-sm: 0 2px 8px rgba(13, 31, 95, 0.06);\n  --shadow-md: 0 8px 24px rgba(13, 31, 95, 0.08);\n  --shadow-lg: 0 18px 48px rgba(13, 31, 95, 0.12);\n  --shadow-brand: 0 12px 32px rgba(30, 64, 239, 0.25);\n\n  /* Inset for pressed-state */\n  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);\n\n  /* ------------------------------------------------------------------\n     MOTION\n     ------------------------------------------------------------------ */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n}\n\n/* ==========================================================================\n   SEMANTIC ELEMENT STYLES\n   ========================================================================== */\n\nhtml, body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-base);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 { font: var(--fw-bold) var(--fs-h1)/var(--lh ----------------------------------------------------- */\n\n  /* Primary — royal blue (paper-plane mark, CTAs, key accents) */\n  --pl-blue-50:  #EEF2FF;\n  --pl-blue-100: #DCE4FF;\n  --pl-blue-200: #B2C0FF;\n  --pl-blue-300: #7A8CFF;\n  --pl-blue-400: #4759F5;\n  --pl-blue-500: #1E40EF;  /* brand notes primary */\n  --pl-blue-600: #0A2FAF;  /* live logo mark color */\n  --pl-blue-700: #0822A0;\n\n  /* Secondary — navy (wordmark, body copy, nav) */\n  --pl-navy-50:  #EBEDF4;\n  --pl-navy-100: #D3D7E8;\n  --pl-navy-200: #99A2C3;\n  --pl-navy-300: #5E6A9B;\n  --pl-navy-400: #2B3A78;\n  --pl-navy-500: #14235F;\n  --pl-navy-600: #0D1F5F;  /* live wordmark color */\n  --pl-navy-700: #0D1952;  /* brand notes secondary */\n  --pl-navy-800: #0A133F;\n\n  /* Accent — orange (energy / highlight / promo; uploads palette) */\n  --pl-orange-50:  #FFF2EB;\n  --pl-orange-100: #FFDFCC;\n  --pl-orange-200: #FFB897;\n  --pl-orange-300: #FF8F5C;\n  --pl-orange-400: #FF6B2B;  /* brand notes accent */\n  --pl-orange-500: #FF5C28;  /* uploads palette */\n  --pl-orange-600: #E64412;\n\n  /* Support — yellow (benchmarks / callouts; uploads palette) */\n  --pl-yellow-100: #FFF5D4;\n  --pl-yellow-300: #FFE08A;\n  --pl-yellow-500: #FDC73D;\n\n  /* Support — cyan (data viz / map accents; uploads palette) */\n  --pl-cyan-100:  #D8F3F7;\n  --pl-cyan-300:  #8CDEE6;\n  --pl-cyan-500:  #3ACCD6;\n  --pl-cyan-700:  #1C8891;\n\n  /* Success — mint green (confirmed from site: \"WITH PORTLESS\" pill,\n     rating stars, success deltas, bar chart fills) */\n  --pl-mint-50:  #E8FAF1;\n  --pl-mint-100: #CEF1DE;\n  --pl-mint-300: #6BD9A3;\n  --pl-mint-500: #22C770;\n  --pl-mint-600: #14A75A;\n\n  /* Neutrals */\n  --pl-ink:      #2F2F2F;   /* uploads palette near-black */\n  --pl-white:    #FFFFFF;\n  --pl-gray-25:  #FAFBFD;\n  --pl-gray-50:  #F4F6FB;\n  --pl-gray-100: #EAEEF6;\n  --pl-gray-200: #D8DDE9;\n  --pl-gray-300: #B9C0D2;\n  --pl-gray-400: #8D95AD;\n  --pl-gray-500: #646B85;\n  --pl-gray-600: #424867;\n  --pl-gray-700: #2A2F4A;\n\n  /* ------------------------------------------------------------------\n     SEMANTIC TOKENS\n     ------------------------------------------------------------------ */\n\n  /* Backgrounds */\n  --bg-page:        var(--pl-white);\n  --bg-subtle:      var(--pl-gray-50);\n  --bg-muted:       var(--pl-gray-100);\n  --bg-inverse:     var(--pl-navy-600);\n  --bg-inverse-alt: var(--pl-navy-800);\n  --bg-brand:       var(--pl-blue-600);\n  --bg-brand-soft:  var(--pl-blue-50);\n\n  /* Foregrounds */\n  --fg-1: var(--pl-navy-600);   /* primary text: headings, body */\n  --fg-2: var(--pl-gray-600);   /* secondary: supporting copy */\n  --fg-3: var(--pl-gray-500);   /* tertiary: captions, labels */\n  --fg-4: var(--pl-gray-400);   /* placeholder, disabled */\n  --fg-on-brand: var(--pl-white);\n  --fg-brand:    var(--pl-blue-600);\n  --fg-accent:   var(--pl-orange-500);\n\n  /* Borders / dividers */\n  --border-subtle: var(--pl-gray-100);\n  --border-base:   var(--pl-gray-200);\n  --border-strong: var(--pl-gray-300);\n  --border-brand:  var(--pl-blue-500);\n\n  /* Status */\n  --success: var(--pl-mint-500);\n  --success-bg: var(--pl-mint-50);\n  --warning: var(--pl-yellow-500);\n  --warning-bg: var(--pl-yellow-100);\n  --danger:  var(--pl-orange-600);\n  --danger-bg: var(--pl-orange-50);\n  --info:    var(--pl-cyan-500);\n  --info-bg: var(--pl-cyan-100);\n\n  /* ------------------------------------------------------------------\n     TYPOGRAPHY\n     ------------------------------------------------------------------ */\n\n  --font-sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;\n\n  /* Font sizes — 1.250 major third scale, tuned for a marketing + app hybrid */\n  --fs-display-1: clamp(3.25rem, 5vw + 1rem, 5.25rem); /* @kind other */\n  --fs-display-2: clamp(2.5rem, 4vw + 1rem, 4rem); /* @kind other */\n  --fs-h1: 3rem;        /* 48 */\n  --fs-h2: 2.25rem;     /* 36 */\n  --fs-h3: 1.75rem;     /* 28 */\n  --fs-h4: 1.375rem;    /* 22 */\n  --fs-h5: 1.125rem;    /* 18 */\n  --fs-lead: 1.25rem;   /* 20 — hero subheads */\n  --fs-body: 1rem;      /* 16 */\n  --fs-sm: 0.875rem;    /* 14 */\n  --fs-xs: 0.75rem;     /* 12 — eyebrows, chips, labels */\n\n  --lh-tight: 1.05; /* @kind font */\n  --lh-snug:  1.2;  /* @kind font */\n  --lh-base:  1.5;  /* @kind font */\n  --lh-loose: 1.7;  /* @kind font */\n\n  --ls-tight:   -0.03em;  /* @kind font */\n  --ls-snug:    -0.015em; /* @kind font */\n  --ls-normal:   0;       /* @kind font */\n  --ls-eyebrow:  0.14em;  /* @kind font */\n\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-black:   800; /* @kind font */\n\n  /* ------------------------------------------------------------------\n     SPACING — 4px base\n     ------------------------------------------------------------------ */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n  --space-32: 128px;\n\n  /* ------------------------------------------------------------------\n     RADII\n     ------------------------------------------------------------------ */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-2xl: 32px;\n  --radius-pill: 999px;\n\n  /* ------------------------------------------------------------------\n     SHADOWS — soft, airy. Used on testimonial cards, stat chips, popovers.\n     ------------------------------------------------------------------ */\n  --shadow-xs: 0 1px 2px rgba(13, 31, 95, 0.06);\n  --shadow-sm: 0 2px 8px rgba(13, 31, 95, 0.06);\n  --shadow-md: 0 8px 24px rgba(13, 31, 95, 0.08);\n  --shadow-lg: 0 18px 48px rgba(13, 31, 95, 0.12);\n  --shadow-brand: 0 12px 32px rgba(30, 64, 239, 0.25);\n\n  /* Inset for pressed-state */\n  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);\n\n  /* ------------------------------------------------------------------\n     MOTION\n     ------------------------------------------------------------------ */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n}\n\n/* ==========================================================================\n   SEMANTIC ELEMENT STYLES\n   ========================================================================== */\n\nhtml, body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-base);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 { font: var(--fw-bold) var(--fs-h1)/var(--lh-tight) var(--font-sans); letter-spacing: var(--ls-snug); color: var(--fg-1); margin: 0; }\nh2, .h2 { font: var(--fw-bold) var(--fs-h2)/var(--lh-tight) var(--font-sans); letter-spacing: var(--ls-snug); color: var(--fg-1); margin: 0; }\nh3, .h3 { font: var(--fw-semibold) var(--fs-h3)/var(--lh-snug) var(--font-sans); letter-spacing: var(--ls-snug); color: var(--fg-1); margin: 0; }\nh4, .h4 { font: var(--fw-semibold) var(--fs-h4)/var(--lh-snug) var(--font-sans); color: var(--fg-1); margin: 0; }\nh5, .h5 { font: var(--fw-semibold) var(--fs-h5)/var(--lh-snug) var(--font-sans); color: var(--fg-1); margin: 0; }\n\n.display-1 { font: var(--fw-bold) var(--fs-display-1)/0.98 var(--font-sans); letter-spacing: var(--ls-tight); color: var(--fg-1); }\n.display-2 { font: var(--fw-bold) var(--fs-display-2)/1.02 var(--font-sans); letter-spacing: var(--ls-tight); color: var(--fg-1); }\n\n.lead    { font-size: var(--fs-lead); line-height: var(--lh-base); color: var(--fg-2); }\np        { font-size: var(--fs-body); line-height: var(--lh-base); color: var(--fg-1); margin: 0 0 var(--space-4); text-wrap: pretty; }\nsmall,\n.caption { font-size: var(--fs-sm); color: var(--fg-3); }\n.tiny    { font-size: var(--fs-xs); color: var(--fg-3); }\n\n.eyebrow {\n  font-size: var(--fs-xs);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  font-weight: var(--fw-semibold);\n  color: var(--fg-brand);\n}\n\ncode, kbd, .mono {\n  font-family: var(--font-mono);\n  font-size: 0.9em;\n  background: var(--bg-muted);\n  padding: 0.1em 0.35em;\n  border-radius: var(--radius-xs);\n  color: var(--pl-navy-700);\n}\n\na {\n  color: var(--fg-brand);\n  text-decoration: none;\n  transition: color var(--dur-fast) var(--ease-out);\n}\na:hover { color: var(--pl-blue-700); }\n\n<\u002Fstyle>\n<script src=\"e913a11a-1c77-4019-ab36-8a741494dce4\"><\u002Fscript>\n\n\n\n\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  a { color: #1E40EF; }\n  a:hover { color: #0822A0; }\n  @keyframes scFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n  .sc-anim { animation: scFadeUp 360ms cubic-bezier(0.22,1,0.36,1) both; }\n  @keyframes scMarkerSweep { 0% { left: 12.5%; } 100% { left: 87.5%; } }\n  .sc-marker { animation: scMarkerSweep 3800ms cubic-bezier(0.45,0,0.55,1) infinite alternate both; }\n  @keyframes scPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(30,64,239,0.28); } 50% { box-shadow: 0 0 0 7px rgba(30,64,239,0); } }\n  input::placeholder { color: #8D95AD; }\n  .dim-row .dim-tip { opacity: 0; visibility: hidden; transform: translateY(4px); transition: opacity .15s, transform .15s, visibility .15s; }\n  .dim-row:hover .dim-tip { opacity: 1; visibility: visible; transform: translateY(0); }\n  :root { --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:linear-gradient(180deg,#FFFFFF 0%,#FFFFFF 8%,#8FA7F8 48%,#8FA7F8 66%,#FFFFFF 88%,#FFFFFF 100%);font-family:'Inter Tight',sans-serif;padding:28px 20px 96px;display:flex;flex-direction:column;align-items:center;\">\n\n  <div style=\"width:100%;max-width:960px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n    <img src=\"29f5cdde-e5fe-4e69-8876-33e8384e7198\" alt=\"Portless\" style=\"height:26px;width:auto;display:block;\">\n  <\u002Fdiv>\n\n  <!-- ===================== INTRO ===================== -->\n  <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n    <div class=\"sc-anim\" style=\"width:100%;max-width:1000px;margin-top:24px;\">\n\n      <!-- HERO -->\n      <div style=\"display:flex;gap:56px;align-items:center;flex-wrap:wrap;padding:32px 0 8px;\">\n        <div style=\"flex:1;min-width:330px;\">\n          <div style=\"display:inline-flex;align-items:center;font-family:var(--font-mono);font-weight:500;font-size:12px;letter-spacing:0.02em;text-transform:uppercase;color:#3E3B38;border:1px solid #3E3B38;border-radius:0;padding:7px 12px;background:transparent;white-space:nowrap;margin-bottom:24px;\">Supply Chain Maturity Diagnostic<\u002Fdiv>\n          <h1 style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;letter-spacing:-0.015em;font-size:52px;line-height:1.02;color:#0B1233;margin:0 0 18px;text-wrap:balance;\">How much cash is your supply chain trapping?<\u002Fh1>\n          <p style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:19px;line-height:1.6;color:#596274;max-width:460px;margin:0 0 22px;\">Twelve quick questions, about two minutes. See your maturity grade from Legacy to Modern, how you compare to brands like yours, and the specific moves to free up cash and speed.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:14px;align-items:flex-start;\">\n            <button type=\"button\" sc-camel-on-click=\"{{ start }}\" style=\"display:inline-flex;align-items:center;gap:12px;font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;color:#fff;background:linear-gradient(180deg,#8FA7F8 0%,#2050F2 100%);border:none;border-radius:10px;cursor:pointer;box-shadow:0 10px 26px rgba(32,80,242,0.28);transition:filter .15s;font-size:18px;padding:15px 26px;\" style-hover=\"filter:brightness(1.06)\">Start the diagnostic<span style=\"font-size:20px;line-height:1;\">→<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- animated meter -->\n        <div style=\"flex:1;min-width:320px;\">\n          <div style=\"background:#F3F0EA;border:1px solid #3E3B38;border-radius:12px;box-shadow:0 18px 48px rgba(43,38,28,0.10);overflow:hidden;\">\n            <div style=\"background:#fff;border-bottom:1px solid #E3DDD1;padding:26px 34px;font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;font-size:16px;letter-spacing:0.01em;color:#3E3B38;\">Supply chain maturity scale<\u002Fdiv>\n            <div style=\"padding:76px 34px 44px;\">\n            <div style=\"position:relative;\">\n              <div class=\"sc-marker\" style=\"position:absolute;top:14px;left:12.5%;z-index:3;\">\n                <div class=\"sc-marker-bubble\" style=\"position:absolute;bottom:22px;left:0;transform:translate(-50%,0);white-space:nowrap;background:#2050F2;color:#fff;font-family:var(--font-mono);font-size:12px;letter-spacing:0.06em;padding:7px 11px;border-radius:3px;\">YOUR BRAND<\u002Fdiv>\n                <div style=\"position:absolute;top:-10px;left:-10px;width:20px;height:20px;border-radius:99px;background:#fff;border:3px solid #2050F2;box-shadow:0 0 0 4px rgba(32,80,242,0.14);animation:scPulse 2200ms ease-out infinite;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:absolute;top:13px;left:12.5%;right:12.5%;height:1.5px;background:repeating-linear-gradient(90deg,#3E3B38 0 4px,transparent 4px 7px);\"><\u002Fdiv>\n              <div style=\"position:relative;display:flex;justify-content:space-between;\">\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;\">\n                  <div style=\"width:28px;height:28px;border-radius:99px;background:#A9BEF8;display:flex;align-items:center;justify-content:center;\"><div style=\"width:15px;height:15px;border-radius:99px;background:#2050F2;\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;font-size:14px;color:#3E3B38;\">Legacy<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;\">\n                  <div style=\"width:28px;height:28px;border-radius:99px;background:#A9BEF8;display:flex;align-items:center;justify-content:center;\"><div style=\"width:15px;height:15px;border-radius:99px;background:#2050F2;\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;font-size:14px;color:#3E3B38;\">Growing<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;\">\n                  <div style=\"width:28px;height:28px;border-radius:99px;background:#A9BEF8;display:flex;align-items:center;justify-content:center;\"><div style=\"width:15px;height:15px;border-radius:99px;background:#2050F2;\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;font-size:14px;color:#3E3B38;\">Optimized<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;\">\n                  <div style=\"width:28px;height:28px;border-radius:99px;background:#A9BEF8;display:flex;align-items:center;justify-content:center;\"><div style=\"width:15px;height:15px;border-radius:99px;background:#2050F2;\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;font-size:14px;color:#3E3B38;\">Modern<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WHY IT MATTERS -->\n      <div style=\"margin-top:76px;\">\n        <div style=\"display:inline-flex;align-items:center;font-family:var(--font-mono);font-weight:500;font-size:12px;letter-spacing:0.02em;text-transform:uppercase;color:#3E3B38;border:1px solid #3E3B38;border-radius:0;padding:6px 10px;background:transparent;margin-bottom:18px;\">Why it matters<\u002Fdiv>\n        <h2 style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;letter-spacing:-0.012em;font-size:38px;line-height:1.08;color:#0B1233;margin:0 0 12px;max-width:640px;text-wrap:balance;\">Your supply chain sets your growth ceiling<\u002Fh2>\n        <p style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:18px;line-height:1.6;color:#596274;max-width:600px;margin:0 0 34px;\">The way you move inventory and capital decides how fast you can grow, how much cash you can deploy, and how far you can reach. The numbers make the case.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);background:#fff;border:1px solid #3E3B38;border-radius:10px;overflow:hidden;\">\n          <div style=\"display:flex;flex-direction:column;padding:28px 26px;border-right:1px solid #3E3B38;\">\n            <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;letter-spacing:-0.02em;font-size:46px;color:#2050F2;line-height:1;\">$1M<\u002Fdiv>\n            <div style=\"margin-top:34px;\">\n              <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:16px;line-height:1.6;color:#596274;min-height:78px;\">of working capital sits idle for every 30 days of inventory a $20M brand carries.<\u002Fdiv>\n              <div style=\"margin-top:14px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;\"><a href=\"https://wayflyer.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#8D95AD;text-decoration:underline;text-underline-offset:2px;\" style-hover=\"color:#2050F2;\">Wayflyer · APQC, 2026<\u002Fa><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;padding:28px 26px;border-right:1px solid #3E3B38;\">\n            <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;letter-spacing:-0.02em;font-size:46px;color:#2050F2;line-height:1;\">59%<\u002Fdiv>\n            <div style=\"margin-top:34px;\">\n              <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:16px;line-height:1.6;color:#596274;min-height:78px;\">of global shoppers now buy from retailers outside their home country.<\u002Fdiv>\n              <div style=\"margin-top:14px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;\"><a href=\"https://capitaloneshopping.com/research\" target=\"_blank\" rel=\"noopener\" style=\"color:#8D95AD;text-decoration:underline;text-underline-offset:2px;\" style-hover=\"color:#2050F2;\">Capital One Shopping, 2025<\u002Fa><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;padding:28px 26px;\">\n            <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;letter-spacing:-0.02em;font-         <div style=\"height:14px;border-radius:99px;background:#EAEEF6;overflow:hidden;\">\n                    <div style=\"{{ b.barStyle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-family:var(--font-mono);font-size:13px;color:#5E6A9B;width:78px;text-align:right;\">{{ b.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:22px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;color:#8D95AD;\">Source: <a href=\"https://www.eightx.co\" target=\"_blank\" rel=\"noopener\" style=\"color:#8D95AD;text-decoration:underline;text-underline-offset:2px;\" style-hover=\"color:#2050F2;\">Eightx<\u002Fa>;&nbsp; <a href=\"https://attnagency.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#8D95AD;text-decoration:underline;text-underline-offset:2px;\" style-hover=\"color:#2050F2;\">ATTN Agency fractional-CFO benchmarks, 2026<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- next steps -->\n          <div style=\"margin-top:20px;background:#fff;border:1px solid #3E3B38;border-radius:12px;box-shadow:0 8px 24px rgba(13,31,95,0.06);padding:36px 40px 18px;\">\n            <div style=\"display:inline-flex;align-items:center;font-family:var(--font-mono);font-weight:500;font-size:12px;letter-spacing:0.02em;text-transform:uppercase;color:#3E3B38;border:1px solid #3E3B38;border-radius:0;padding:6px 10px;background:transparent;margin-bottom:18px;\">Your next moves<\u002Fdiv>\n            <h3 style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;font-size:27px;letter-spacing:-0.01em;color:#0B1233;margin:0 0 26px;\">Three things to act on now<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;\">\n              <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:18px;align-items:flex-start;padding:22px 40px;margin:0 -40px;border-top:1px solid #E4E4F0;\">\n                  <div style=\"flex:none;width:34px;height:34px;border-radius:0;border:1px solid #3E3B38;background:#2050F2;color:#fff;font-family:var(--font-mono);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;\">{{ s.n }}<\u002Fdiv>\n                  <div>\n                    <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-size:19px;font-weight:500;color:#0B1233;margin-bottom:4px;\">{{ s.title }}<\u002Fdiv>\n                    <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:16px;line-height:1.6;color:#596274;\">{{ s.body }} {{ s.first }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- PROOF -->\n          <div style=\"position:relative;margin-top:20px;background:#fff;border:1px solid #3E3B38;border-radius:12px;box-shadow:0 8px 24px rgba(13,31,95,0.06);padding:36px 40px;\">\n            <div style=\"margin-bottom:18px;\">\n              <div style=\"display:inline-flex;align-items:center;font-family:var(--font-mono);font-weight:500;font-size:12px;letter-spacing:0.02em;text-transform:uppercase;color:#3E3B38;border:1px solid #3E3B38;border-radius:0;padding:6px 10px;background:transparent;\">A brand at your stage<\u002Fdiv>\n              <sc-if value=\"{{ proofLogo }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;top:28px;right:40px;line-height:0;\">{{ proofLogoImg }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ proofIsPlaceholder }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:inline-flex;align-items:center;margin-bottom:14px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:#B08900;border:1px solid #E4D9B0;background:#FDF6E3;border-radius:0;padding:4px 8px;\">Example \\u00b7 pending real story<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;letter-spacing:-0.02em;font-size:30px;line-height:1.14;color:#2050F2;margin:0 0 14px;text-wrap:balance;\">{{ proofResult }}<\u002Fdiv>\n            <div style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:18px;line-height:1.6;color:#596274;max-width:620px;\">“{{ proofQuote }}”<\u002Fdiv>\n            <sc-if value=\"{{ proofHasPerson }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:16px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;color:#3E3B38;\">{{ proofPerson }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <a href=\"{{ proofUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:22px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;text-transform:uppercase;color:#2050F2;text-decoration:none;\" style-hover=\"color:#0822A0;\">Read the case study<span style=\"font-size:15px;line-height:1;\">→<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n\n          <!-- CTA -->\n          <div style=\"margin-top:20px;background:#fff;border:1px solid #3E3B38;border-radius:12px;padding:40px;text-align:center;box-shadow:0 8px 24px rgba(13,31,95,0.06);\">\n            <h3 style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;font-size:26px;letter-spacing:-0.02em;color:#0B1233;margin:0 0 10px;\">Want to close the gap?<\u002Fh3>\n            <p style=\"font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:16px;line-height:1.6;color:#596274;margin:0 auto 24px;max-width:480px;\">Book a 15-minute supply chain teardown. We'll walk through your result together and figure out where to start.<\u002Fp>\n            <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:12px;font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;color:#fff;background:linear-gradient(180deg,#8FA7F8 0%,#2050F2 100%);border:none;border-radius:10px;cursor:pointer;box-shadow:0 10px 26px rgba(32,80,242,0.28);transition:filter .15s;font-size:17px;padding:14px 26px;\">Book your 15-minute teardown<span style=\"font-size:20px;line-height:1;\">→<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;text-align:center;\">\n            <button type=\"button\" sc-camel-on-click=\"{{ restart }}\" style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#5E6A9B;background:none;border:none;cursor:pointer;\">↻ Retake the diagnostic<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820},&quot;autoAdvance&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;shuffleAnswers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n\n    const scored = [\n      { id: 'q1', tag: 'Inventory lead time', label: 'Inventory lead time',\n        stem: 'When you place a PO with your manufacturer, how long until that stock is sellable?',\n        options: [\n          { label: 'More than 90 days', points: 0 },\n          { label: '60 to 90 days', points: 1 },\n          { label: '30 to 60 days', points: 2 },\n          { label: 'Under 30 days', points: 3 },\n        ] },\n      { id: 'q2', tag: 'Reorder frequency', label: 'Reorder frequency',\n        stem: 'How often do you reorder your hero SKUs?',\n        options: [\n          { label: 'One or two times a year', points: 0 },\n          { label: 'A few times a year', points: 1 },\n          { label: 'Roughly once a month', points: 2 },\n          { label: 'Every few weeks or more often', points: 3 },\n        ] },\n      { id: 'q3', tag: 'Cash in inventory', label: 'Cash in inventory',\n        stem: 'How much of your working capital is tied up in inventory at any given time?',\n        options: [\n          { label: 'More than 75%', points: 0 },\n          { label: 'About half to three-quarters', points: 1 },\n          { label: 'A quarter to half', points: 2 },\n          { label: 'Less than a quarter', points: 3 },\n        ] },\n      { id: 'q4', tag: 'Forecasting horizon', label: 'Forecasting horizon',\n        stem: 'How far ahead do you predict demand for your products?',\n        options: [\n          { label: 'Six months or more', points: 0 },\n          { label: 'Three to six months', points: 1 },\n          { label: 'One to three months', points: 2 },\n          { label: 'A few weeks at a time', points: 3 },\n        ] },\n      { id: 'q5', tag: 'International reach', label: 'International reach',\n        stem: 'How many countries do you fulfill orders to currently?',\n        options: [\n          { label: 'Domestic only', points: 0 },\n          { label: 'One or two countries', points: 1 },\n          { label: 'Three to ten countries', points: 2 },\n          { label: 'More than 10 countries', points: 3 },\n        ] },\n      { id: 'q6', tag: 'Cash conversion cycle', label: 'Cash conversion cycle',\n        stem: 'How long is your cash conversion cycle, the time between paying your supplier and getting paid by your customer?',\n        options: [\n          { label: 'More than 90 days', points: 0 },\n          { label: '60 to 90 days', points: 1 },\n          { label: '30 to 60 days', points: 2 },\n          { label: 'Under 30 days', points: 3 },\n        ] },\n      { id: 'q7', tag: 'Fulfillment model', label: 'Fulfillment model',\n        stem: 'Where is your inventory stored before it ships to a customer?',\n        options: [\n          { label: 'Bulk in domestic 3PL warehouses', points: 0 },\n          { label: 'Mostly domestic warehouses', points: 1 },\n          { label: 'A mix of warehouse and direct', points: 2 },\n          { label: 'It ships direct from the point of origin', points: 3 },\n        ] },\n      { id: 'q8', tag: 'Stockouts and dead stock', label: 'Stockouts & dead stock',\n        stem: 'How often do you wrestle with stockouts or dead stock?',\n        options: [\n          { label: 'Frequently', points: 0 },\n          { label: 'Fairly often', points: 1 },\n          { label: 'Occasionally', points: 2 },\n          { label: 'Rarely', points: 3 },\n        ] },\n      { id: 'q9', tag: 'Double duties', label: 'Double duties', pain: true,\n        stem: 'Do you ever get charged duties more than once on the same goods?',\n        options: [\n          { label: 'On most shipments', points: 0 },\n          { label: 'Often', points: 1 },\n          { label: 'Occasionally', points: 2 },\n          { label: 'Never', points: 3 },\n        ] },\n      { id: 'q10', tag: 'Customs & port delays', label: 'Customs & port delays', pain: true,\n        stem: 'How often does a shipment get held up in customs or stuck at port?',\n        options: [\n          { label: 'On most shipments', points: 0 },\n          { label: 'Often', points: 1 },\n          { label: 'Occasionally', points: 2 },\n          { label: 'Rarely', points: 3 },\n        ] },\n    ];\n\n    const profiling = [\n      { id: 'p1', profiling: true, tag: 'About your brand',\n        stem: 'What does your brand do in annual revenue?',\n        note: 'Used to compare you with brands your size.',\n        options: [\n          { label: 'Under $1M' }, { label: '$1M to $10M' },\n          { label: '$10M to $50M' }, { label: 'Over $50M' },\n        ] },\n      { id: 'p2', profiling: true, tag: 'About your brand',\n        stem: 'And what do you sell?',\n        note: 'Used to compare you against similar brands.',\n        options: [\n          { label: 'Apparel & accessories' }, { label: 'Beauty & personal care' },\n          { label: 'Health & supplements' }, { label: 'Home & lifestyle' },\n          { label: 'Food & beverage' }, { label: 'Electronics & gadgets' },\n          { label: 'Something else' },\n        ] },\n    ];\n\n    this.questions = scored.concat(profiling);\n\n    const doShuffle = (this.props.shuffleAnswers ?? true);\n    this.display = {};\n    this.questions.forEach(q => {\n      let opts = q.options.slice();\n      if (doShuffle && !q.profiling) {\n        for (let i = opts.length - 1; i > 0; i--) {\n          const j = Math.floor(Math.random() * (i + 1));\n          [opts[i], opts[j]] = [opts[j], opts[i]];\n        }\n      }\n      this.display[q.id] = opts;\n    });\n\n    this.GRADES = {\n      Legacy: {\n        color: '#FF5C28',\n        headline: 'Your supply chain is running on the legacy model',\n        diagnosis: \"Long lead times, big bulk orders, and cash locked in stock are setting the ceiling on how fast you can grow. You're forecasting far out and absorbing the risk when you guess wrong. This is the model most brands start on, and the one that quietly caps revenue once you scale.\",\n        steps: [\n          { title: 'Map your cash conversion cycle', body: 'See exactly how many days your money is trapped between paying suppliers and getting paid by customers.', first: 'Pull your average payables and receivables days from the last 90 days, then add your days of inventory on hand.' },\n          { title: 'Find your hero SKUs', body: 'Identify the products worth piloting on a faster, lower-inventory model first.', first: 'List the SKUs that drive ~80% of revenue and flag the ones that stock out or sit longest.' },\n          { title: 'Pressure-test one international market', body: 'Even one new market exposes how much the current model is holding back reach.', first: 'Pick the country already sending you the most traffic or requests and price out what it takes to serve it today.' },\n        ],\n        proof: { placeholder: false, brand: 'Cosara', result: 'Left an unreliable 3PL and grew weekly revenue 10x', quote: 'We immediately saw the improvement in the shipping time, the reliability, and the fact that we could see the status of every order.', person: 'Laura McDowell, COO, Cosara', logoId: 'proof-logo-cosara', url: 'https://www.portless.com/case-studies/how-cosara-grew-10x-in-revenue-with-portless', logo: 'assets/logo-cosara.webp' },\n      },\n      Growing: {\n        color: '#F5A623',\n        headline: \"You're scaling, but the model is straining\",\n        diagnosis: \"Volume is growing faster than your supply chain can comfortably carry. The inventory-forward setup is starting to cost you in cash and speed, and international is more friction than it should be. You've outgrown the legacy model, and the question is what you move to next.\",\n        steps: [\n          { title: 'Quantify the cash you could free', body: 'Model your current inventory holding cost against a leaner replenishment approach.', first: 'Total the value of inventory sitting in warehouses right now and multiply by your cost of capital.' },\n          { title: 'Shorten your reorder cycle', body: 'Smaller, more frequent batches cut both stockout risk and dead stock.', first: 'Take one hero SKU and cut its order quantity in half while doubling the order frequency for a quarter.' },\n          { title: 'Tighten your cash conversion cycle', body: 'Every day you shave off the gap between paying suppliers and getting paid is working capital back in your hands.', first: 'Renegotiate payment terms with your largest supplier, or move the slowest leg of transit off the critical path.' },\n        ],\n        proof: { placeholder: false, brand: 'Craft Club', result: '3x growth, 3x drop in cash conversion cycle', quote: 'With Portless pretty much immediately, we saw a 3x in growth which pretty much corresponded a 3x drop in our cash flow conversion cycle.', person: 'Nikos Maniaty, Craft Club', logoId: 'proof-logo-craftclub', url: 'https://www.portless.com/case-studies/club-achieved-3x-growth-with-direct-fulfillment', logo: 'assets/logo-craftclub.png' },\n      },\n      Optimized: {\n        color: '#1CA6B0',\n        headline: \"You're actively modernizing\",\n        diagnosis: \"You're already shrinking lead times, reordering smarter, and expanding internationally. You've moved past the bulk-and-hope model. The remaining gains are in how much inventory you still hold and how directly you can get product to the customer.\",\n        steps: [\n          { title: 'Pilot direct fulfillment on a product line', body: 'Test shipping straight from origin for your fastest-moving SKUs.', first: 'Choose one high-velocity line and run direct fulfillment alongside your existing 3PL for 30 days to compare.' },\n          { title: 'Close the last cash gap', body: 'Target the working capital still tied up in safety stock.', first: 'Identify the safety stock you hold purely to cover long lead times, and model what a shorter cycle would release.' },\n          { title: 'Make global reach the default', body: 'Turn the markets you can technically reach into markets you actively sell to.', first: 'Turn on local pricing and tracking for your top two international markets instead of treating them as exceptions.' },\n        ],\n        proof: { placeholder: false, brand: 'Privacy Clo', result: 'Cut inbound from 90 days to 24 hours, opened 17 new markets', quote: 'You win back pretty much 7 days of each month, minimum. Your year ends up a lot bigger than all your competitors.', person: 'Ryan De Gennaro, Founder, Privacy Clo', logoId: 'proof-logo-privacyclo', url: 'https://www.portless.com/case-studies/from-90-days-to-24-hours-how-privacy-clo-opened-17-new-markets', logo: 'assets/logo-privacyclo.webp' },\n      },\n      Modern: {\n        color: '#14A75A',\n        headline: \"You're running a modern supply chain\",\n        diagnosis: 'Agile replenishment, minimal idle inventory, direct fulfillment, and global reach by default. Your capital is free to fund growth instead of sitting on shelves. You\\u2019re operating the way the best brands are heading, and the focus now is protecting the edge as you scale.',\n        steps: [\n          { title: 'Stress-test for peak', body: 'Make sure the model holds through your highest-volume season without reverting to bulk.', first: 'Model your peak-week order volume against current capacity and find the first constraint that breaks.' },\n          { title: 'Expand the direct footprint', body: \"Extend what's working to more SKUs and more markets.\", first: 'Take the SKUs and markets already running direct and map the next tier ready to move over.' },\n          { title: 'Benchmark against the frontier', body: 'Compare your speed, cash cycle, and reach against where the model is going next.', first: 'Track your lead time, cash conversion cycle, and active markets quarter over quarter, not just once.' },\n        ],\n        proof: { placeholder: false, brand: 'memobottle', result: 'Consolidated six warehouses into one, cutting a 120-day cash cycle to near-zero and inventory 5x', quote: 'It has allowed us to bring product launches forward by 100+ days. It finishes at our supplier, goes into the warehouse, and we sell the next day.', person: 'Jesse Leeworthy, Co-founder, memobottle', logoId: 'proof-logo-memobottle', url: 'https://www.portless.com/case-studies/how-memobottle-cut-a-120-day-cash-cycle-by-consolidating-six-global-warehouses-into-one', logo: 'assets/logo-memobottle.jpg' },\n      },\n    };\n    this.meterOrder = ['Legacy', 'Growing', 'Optimized', 'Modern'];\n\n    this.CATS = {\n      'Apparel & accessories': { key: 'Apparel', t: [60, 120], b: [35, 50] },\n      'Beauty & personal care': { key: 'Beauty & personal care', t: [45, 90], b: [25, 40] },\n      'Health & supplements': { key: 'Health & supplements', t: [30, 60], b: [20, 35] },\n      'Home & lifestyle': { key: 'Home & lifestyle', t: [60, 120], b: [40, 60] },\n      'Food & beverage': { key: 'Food & beverage', t: [15, 30], b: [8, 15] },\n    };\n    this.DEFAULT_CAT = { key: 'Other', t: [110, 131], b: [45, 60] };\n\n    this.state = { screen: 'intro', qi: 0, answers: {}, unlocked: false, email: '', err: '' };\n    this.lastGrade = null;\n    this.lastScore = 0;\n  }\n\n  start = () => this.setState({ screen: 'quiz', qi: 0 });\n\n  back = () => { if (this.state.qi > 0) this.setState({ qi: this.state.qi - 1 }); };\n\n  pick(q, opt) {\n    const answers = Object.assign({}, this.state.answers);\n    answers[q.id] = q.profiling ? opt.label : opt.points;\n    this.setState({ answers });\n    const auto = (this.props.autoAdvance ?? true);\n    if (this._t) clearTimeout(this._t);\n    if (auto) this._t = setTimeout(() => this.advance(), 240);\n    else this.advance();\n  }\n\n  advance() {\n    const { qi } = this.state;\n    if (qi < this.questions.length - 1) this.setState({ qi: qi + 1 });\n    else this.finish();\n  }\n\n  finish() {\n    let s = 0;\n    this.questions.forEach(q => {\n      if (!q.profiling && typeof this.state.answers[q.id] === 'number') s += this.state.answers[q.id];\n    });\n    let g = 'Legacy';\n    if (s >= 25) g = 'Modern';\n    else if (s >= 18) g = 'Optimized';\n    else if (s >= 10) g = 'Growing';\n    this.lastScore = s;\n    this.lastGrade = g;\n    this.setState({ screen: 'result' });\n    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  onEmail = (e) => this.setState({ email: e.target.value });\n\n  getCookie(name) {\n    if (typeof document === 'undefined') return '';\n    const m = document.cookie.match('(^|;)\\\\s*' + name + '\\\\s*=\\\\s*([^;]+)');\n    return m ? m.pop() : '';\n  }\n\n  unlock = () => {\n    const HS_PORTAL = 'YOUR_PORTAL_ID';\n    const HS_FORM = 'YOUR_FORM_GUID';\n    const v = (this.state.email || '').trim();\n    const ok = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v);\n    if (!ok) { this.setState({ err: 'Please enter a valid email.' }); return; }\n    this.setState({ err: '' });\n\n    const payload = {\n      fields: [\n        { name: 'email', value: v },\n        { name: 'supply_chain_grade', value: this.lastGrade },\n        { name: 'supply_chain_score', value: String(this.lastScore) },\n      ],\n      context: {\n        hutk: this.getCookie('hubspotutk'),\n        pageUri: (typeof window !== 'undefined') ? window.location.href : '',\n        pageName: (typeof document !== 'undefined') ? document.title : '',\n      },\n    };\n    try {\n      fetch('https://api.hsforms.com/submissions/v3/integration/submit/' + HS_PORTAL + '/' + HS_FORM,\n        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(() => {});\n    } catch (e) { /* reveal regardless */ }\n\n    this.setState({ unlocked: true });\n  };\n\n  restart = () => this.setState({ screen: 'intro', qi: 0, answers: {}, unlocked: false, email: '', err: '' });\n\n  ptsToDays(p) { return ({ 0: 120, 1: 90, 2: 50, 3: 25 })[p] ?? 90; }\n\n  renderVals() {\n    const { screen, qi, answers } = this.state;\n    const isIntro = screen === 'intro';\n    const isQuiz = screen === 'quiz';\n    const isResult = screen === 'result';\n\n    const base = { isIntro, isQuiz, isResult, start: this.start, back: this.back, restart: this.restart };\n\n    if (isQuiz) {\n      const q = this.questions[qi];\n      const total = this.questions.length;\n      const sel = answers[q.id];\n      const opts = this.display[q.id].map((o, i) => {\n        const on = q.profiling ? (sel === o.label) : (sel !== undefined && sel === o.points);\n        return {\n          label: o.label,\n          letter: String.fromCharCode(65 + i),\n          pick: () => this.pick(q, o),\n          style: 'display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:17px 20px;border-radius:0;margin-top:-1px;cursor:pointer;font-family:\\'Inter Tight\\',-apple-system,BlinkMacSystemFont,sans-serif;font-size:19px;font-weight:500;transition:all .15s;position:relative;'\n            + (on\n              ? 'border:1.5px solid #1E40EF;background:#EEF2FF;color:#0822A0;z-index:2;'\n              : 'border:1px solid #D8DDE9;background:#fff;color:#0B1233;z-index:1;'),\n          letterStyle: 'flex:none;width:28px;height:28px;border-radius:0;border:1px solid #3E3B38;background:#2050F2;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:13px;font-weight:600;',\n          checkStyle: 'flex:none;font-size:15px;color:#1E40EF;transition:opacity .15s;opacity:' + (on ? '1' : '0') + ';',\n        };\n      });\n      return Object.assign(base, {\n        qKey: q.id,\n        qNumber: String(qi + 1).padStart(2, '0'),\n        qTotal: String(total).padStart(2, '0'),\n        progressPct: Math.round(((qi) / (total - 1)) * 100),\n        qTag: q.tag,\n        qStem: q.stem,\n        qNote: q.note || '',\n        qHasNote: !!q.note,\n        qNoNote: !q.note,\n        canBack: qi > 0,\n        options: opts,\n      });\n    }\n\n    if (isResult) {\n      const g = this.lastGrade || 'Legacy';\n      const gd = this.GRADES[g];\n      const score = this.lastScore;\n      const gi = this.meterOrder.indexOf(g);\n\n      const meter = this.meterOrder.map((name, i) => {\n        const active = i === gi;\n        const c = this.GRADES[name].color;\n        return {\n          name,\n          trackStyle: 'flex:1;height:auto;border-radius:8px;padding:10px 0 8px;text-align:center;transition:all .2s;'\n            + (active ? 'background:' + c + ';' : 'background:#F0ECE3;'),\n          labelStyle: 'font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;'\n            + (active ? 'color:#fff;' : 'color:#9A9384;'),\n        };\n      });\n\n      const dimQs = this.questions.filter(q => !q.profiling);\n      const dimColors = ['#FF5C28', '#F5A623', '#3ACCD6', '#22C770'];\n      const dims = dimQs.map(q => {\n        const sc = typeof answers[q.id] === 'number' ? answers[q.id] : 0;\n        const scale = q.options.slice().sort((a, b) => a.points - b.points).map(o => ({\n          pts: o.points + (o.points === 1 ? ' pt' : ' pts'),\n          label: o.label,\n          you: o.points === sc,\n          rowStyle: 'display:flex;gap:10px;align-items:baseline;padding:6px 0;'\n            + (o.points === sc ? 'opacity:1;' : 'opacity:0.6;'),\n          ptStyle: 'flex:none;width:44px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.02em;'\n            + (o.points === sc ? 'color:#8FA7F8;font-weight:600;' : 'color:#8D95AD;'),\n          labelStyle: 'flex:1;font-family:\\'Geist\\',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;line-height:1.45;'\n            + (o.points === sc ? 'color:#fff;font-weight:500;' : 'color:#C7CBD6;font-weight:400;'),\n        }));\n        return {\n          label: q.label,\n          score: sc,\n          scale,\n          barStyle: 'height:100%;border-radius:99px;transition:width .5s;width:' + Math.max(6, (sc / 3) * 100) + '%;background:' + dimColors[sc] + ';',\n        };\n      });\n\n      // benchmark\n      const catAns = answers['p2'];\n      const cat = this.CATS[catAns] || this.DEFAULT_CAT;\n      const q1 = typeof answers['q1'] === 'number' ? answers['q1'] : 1;\n      const q6 = typeof answers['q6'] === 'number' ? answers['q6'] : 1;\n      const yourDays = Math.round((this.ptsToDays(q1) + this.ptsToDays(q6)) / 2);\n      const axis = 140;\n      const pct = (d) => Math.max(4, Math.min(100, (d / axis) * 100));\n      const tMid = Math.round((cat.t[0] + cat.t[1]) / 2);\n      const bMid = Math.round((cat.b[0] + cat.b[1]) / 2);\n      const benchBars = [\n        { label: 'Your estimate', value: '~' + yourDays + ' days', labelColor: '#1E40EF',\n          barStyle: 'height:100%;border-radius:99px;width:' + pct(yourDays) + '%;background:#1E40EF;' },\n        { label: 'Typical', value: cat.t[0] + '\\u2013' + cat.t[1] + ' days', labelColor: '#5E6A9B',\n          barStyle: 'height:100%;border-radius:99px;width:' + pct(tMid) + '%;background:#B9C0D2;' },\n        { label: 'Best-in-class', value: cat.b[0] + '\\u2013' + cat.b[1] + ' days', labelColor: '#14A75A',\n          barStyle: 'height:100%;border-radius:99px;width:' + pct(bMid) + '%;background:#22C770;' },\n      ];\n      const benchIntro = 'Based on your lead time and cash conversion answers, you\\u2019re carrying roughly ' + yourDays\n        + ' days of inventory. Here\\u2019s how that stacks up against ' + cat.key.toLowerCase() + ' brands.';\n\n      const steps = gd.steps.map((s, i) => ({ n: String(i + 1), title: s.title, body: s.body, first: s.first }));\n      const maxScore = this.questions.filter(q => !q.profiling).length * 3;\n      const pf = gd.proof || {};\n\n      return Object.assign(base, {\n        gradeName: g,\n        gradeColor: gd.color,\n        gradeHeadline: gd.headline,\n        gradeDiagnosis: gd.diagnosis,\n        score,\n        maxScore,\n        meter,\n        gateOpen: !this.state.unlocked,\n        unlocked: this.state.unlocked,\n        revealStyle: this.state.unlocked\n          ? 'transition:filter .5s ease;'\n          : 'filter:blur(8px);pointer-events:none;user-select:none;transition:filter .5s ease;',\n        email: this.state.email,\n        onEmail: this.onEmail,\n        unlock: this.unlock,\n        hasErr: !!this.state.err,\n        err: this.state.err,\n        dims,\n        benchCategory: cat.key,\n        benchIntro,\n        benchBars,\n        steps,\n        proofBrand: pf.brand || '',\n        proofResult: pf.result || '',\n        proofQuote: pf.quote || '',\n        proofPerson: pf.person || '',\n        proofIsPlaceholder: !!pf.placeholder,\n        proofHasPerson: !!pf.person,\n        proofUrl: pf.url || '#',\n        proofLogoId: pf.logoId || 'proof-logo',\n        proofLogo: pf.logo || '',\n        proofLogoImg: pf.logo ? React.createElement('img', { src: pf.logo, alt: pf.brand || '', style: { height: '120px', width: 'auto', maxWidth: '280px', objectFit: 'contain', objectPosition: 'right center' } }) : null,\n      });\n    }\n\n    return base;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
